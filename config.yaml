  reason: "Slack-Cadence-Audit-Automation, Operational-Visibility eingespart"
  schwer_quantifizierbar: true

migration_provenance:
  source_welle: 25
  pre_skeleton_engine_loc: 180
  reference_pattern: df-145
  skeleton_created: 2026-05-13

trinity_compliance:
  options_presented_in_spec: true
  variants:
    - conservative: "Mock-Mode default"
    - aggressive: "DF_158_REAL_API_ENABLED=true (Slack-API-Integration Phase-2)"
    - contrarian: "DF-158 sunset wenn Slack-Analytics-Pro genutzt wird"

crux_bindung:
  K_0: "n/a"
  Q_0: "Team-Kommunikations-Hygiene"
