    rule: "Slack-Message-Send oder Delete"
    enforcement: "DF hat KEINE Slack-Write-API"
  - id: Q0-2
    rule: "Decision-Empfehlungen produzieren"
    enforcement: "Decision-Keyword-RegEx"

rho_estimate:
